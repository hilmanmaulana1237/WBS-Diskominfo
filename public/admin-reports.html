<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Pengaduan - WBS Diskominfo</title>
    <link href="/assets/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/assets/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Mobile Sidebar Toggle -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="bi bi-list"></i>
    </button>

    <!-- Dashboard Wrapper -->
    <div class="dashboard-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <img src="assets/logo.jpg" alt="Logo" onerror="this.style.display='none'">
                <h3>WBS Admin</h3>
            </div>
            
            <div class="sidebar-menu">
                <div class="menu-label">Main Menu</div>
                <a href="/admin-dashboard.html" class="menu-item">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/admin-reports.html" class="menu-item active">
                    <i class="bi bi-file-text"></i>
                    <span>Laporan Pengaduan</span>
                </a>
                <a href="/admin-users.html" class="menu-item">
                    <i class="bi bi-people"></i>
                    <span>Manajemen User</span>
                </a>
                
                <div class="menu-divider"></div>
                
                <div class="menu-label">Account</div>
                <a href="#" class="menu-item" onclick="logout()">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <div class="top-navbar">
                <h2><i class="bi bi-file-text"></i> Laporan Pengaduan</h2>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <span id="adminName" style="display: none;"></span>
                    <button class="btn btn-sm btn-success ms-3" onclick="exportAllCSV()">
                        <i class="bi bi-file-spreadsheet"></i> Export CSV
                    </button>
                </div>
            </div>

            <!-- Content -->
            <div class="main-content-inner">
                <!-- Filter Section -->
                <div class="row">
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0"><i class="bi bi-funnel"></i> Filter Laporan</h5>
                            </div>
                            <div class="card-body">
                                <!-- Filter Section -->
                                <div class="mb-3 p-3 bg-light rounded">
                                <div class="row g-2 align-items-end">
                                    <div class="col-lg-2 col-md-4 col-sm-6">
                                        <label class="form-label small mb-1 fw-semibold">Bulan</label>
                                        <select class="form-select" id="filterMonth" style="height: 38px;">
                                            <option value="">Semua Bulan</option>
                                            <option value="1">Januari</option>
                                            <option value="2">Februari</option>
                                            <option value="3">Maret</option>
                                            <option value="4">April</option>
                                            <option value="5">Mei</option>
                                            <option value="6">Juni</option>
                                            <option value="7">Juli</option>
                                            <option value="8">Agustus</option>
                                            <option value="9">September</option>
                                            <option value="10">Oktober</option>
                                            <option value="11">November</option>
                                            <option value="12">Desember</option>
                                        </select>
                                    </div>
                                    <div class="col-lg-2 col-md-4 col-sm-6">
                                        <label class="form-label small mb-1 fw-semibold">Tahun</label>
                                        <select class="form-select" id="filterYear" style="height: 38px;">
                                            <option value="">Pilih Tahun</option>
                                            <option value="2026" selected>2026</option>
                                            <option value="2025">2025</option>
                                            <option value="2024">2024</option>
                                        </select>
                                    </div>
                                    <div class="col-lg-2 col-md-4 col-sm-6">
                                        <label class="form-label small mb-1 fw-semibold">Tanggal Mulai</label>
                                        <input type="date" class="form-control" id="filterStartDate" style="height: 38px;">
                                    </div>
                                    <div class="col-lg-2 col-md-4 col-sm-6">
                                        <label class="form-label small mb-1 fw-semibold">Tanggal Akhir</label>
                                        <input type="date" class="form-control" id="filterEndDate" style="height: 38px;">
                                    </div>
                                    <div class="col-lg-2 col-md-4 col-sm-6">
                                        <label class="form-label small mb-1 fw-semibold">Jenis</label>
                                        <select class="form-select" id="filterJenis" style="height: 38px;">
                                            <option value="">Semua Jenis</option>
                                            <option value="aduan">Aduan</option>
                                            <option value="saran">Saran</option>
                                        </select>
                                    </div>
                                    <div class="col-lg-2 col-md-4 col-sm-6">
                                        <label class="form-label small mb-1 fw-semibold">Status</label>
                                        <select class="form-select" id="filterStatus" style="height: 38px;">
                                            <option value="">Semua Status</option>
                                            <option value="pending">Menunggu</option>
                                            <option value="diterima">Diterima</option>
                                            <option value="diproses">Diproses</option>
                                            <option value="selesai">Selesai</option>
                                            <option value="ditolak">Ditolak</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="row mt-2">
                                    <div class="col-12">
                                        <button class="btn btn-primary me-2" onclick="applyFilters()">
                                            <i class="bi bi-filter"></i> Terapkan Filter
                                        </button>
                                        <button class="btn btn-secondary" onclick="resetFilters()">
                                            <i class="bi bi-arrow-clockwise"></i> Reset
                                        </button>
                                    </div>
                                </div>
                            </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Reports Data -->
                <div class="row mt-2">
                <div class="col-md-12">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0"><i class="bi bi-list-ul"></i> Daftar Laporan</h5>
                        </div>
                        <div class="card-body p-3">
                            <div id="reportsContainer">
                                <!-- Reports will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </main>
    </div>

    <script src="/assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Check authentication
        if (!isLoggedIn()) {
            window.location.href = '/login.html';
        }

        const user = getUser();
        if (user.role !== 'admin') {
            window.location.href = '/user-dashboard.html';
        }

        // Display admin name
        document.getElementById('adminName').textContent = user.name;

        // Load all reports
        async function loadReports() {
            try {
                const container = document.getElementById('reportsContainer');
                container.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary"></div><p class="mt-2">Memuat data laporan...</p></div>';

                // Build query parameters from filters
                const params = new URLSearchParams();
                
                const month = document.getElementById('filterMonth')?.value;
                const year = document.getElementById('filterYear')?.value;
                const startDate = document.getElementById('filterStartDate')?.value;
                const endDate = document.getElementById('filterEndDate')?.value;
                const jenis = document.getElementById('filterJenis')?.value;
                const status = document.getElementById('filterStatus')?.value;

                if (month && year) {
                    params.append('month', month);
                    params.append('year', year);
                }

                if (startDate && endDate) {
                    params.append('start_date', startDate);
                    params.append('end_date', endDate);
                }

                if (jenis) {
                    params.append('jenis_laporan', jenis);
                }

                if (status) {
                    params.append('status', status);
                }

                const queryString = params.toString();
                const endpoint = `/reports/admin/all${queryString ? '?' + queryString : ''}`;
                
                const data = await apiCall(endpoint);
                
                if (data.reports.length === 0) {
                    container.innerHTML = '<div class="alert alert-info text-center"><i class="bi bi-info-circle"></i> Tidak ada laporan yang sesuai dengan filter</div>';
                    return;
                }

                let html = '<div class="table-responsive"><table class="table table-hover table-bordered align-middle">';
                html += '<thead class="table-dark"><tr><th width="3%" class="text-center">No</th><th width="25%">Judul</th><th width="8%" class="text-center">Jenis</th><th width="12%">Pelapor</th><th width="10%" class="text-center">Tanggal</th><th width="9%" class="text-center">Status</th><th width="10%" class="text-center">Dibuat</th><th width="12%" class="text-center">Aksi</th></tr></thead><tbody>';

                data.reports.forEach((report, index) => {
                    const jenisBadge = report.jenis_laporan === 'aduan' 
                        ? '<span class="badge bg-danger"><i class="bi bi-exclamation-triangle"></i> Aduan</span>' 
                        : '<span class="badge bg-info"><i class="bi bi-chat-dots"></i> Saran</span>';
                    
                    html += `<tr>
                        <td class="text-center">${index + 1}</td>
                        <td><strong>${report.title}</strong></td>
                        <td class="text-center">${jenisBadge}</td>
                        <td><i class="bi bi-person"></i> ${report.user_name}</td>
                        <td class="text-center">${formatDate(report.date)}</td>
                        <td class="text-center"><span class="badge ${getStatusBadgeClass(report.status)}">${getStatusLabel(report.status)}</span></td>
                        <td class="text-center">${formatDate(report.created_at)}</td>
                        <td class="text-center">
                            <a href="/report-detail.html?id=${report.id}" class="btn btn-sm btn-info me-1" title="Lihat Detail">
                                <i class="bi bi-eye"></i>
                            </a>
                            <button class="btn btn-sm btn-warning" onclick="updateStatus(${report.id})" title="Update Status">
                                <i class="bi bi-pencil"></i>
                            </button>
                        </td>
                    </tr>`;
                });

                html += '</tbody></table></div>';
                
                // Add summary
                html += `<div class="mt-3 p-3 bg-light rounded">
                    <p class="mb-0"><strong>Total Laporan:</strong> ${data.reports.length}</p>
                </div>`;
                
                container.innerHTML = html;
            } catch (error) {
                showAlert('Gagal memuat laporan: ' + error.message, 'danger');
                document.getElementById('reportsContainer').innerHTML = 
                    '<div class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> Gagal memuat data laporan</div>';
            }
        }

        // Apply filters
        function applyFilters() {
            loadReports();
        }

        // Reset filters
        function resetFilters() {
            document.getElementById('filterMonth').value = '';
            document.getElementById('filterYear').value = '';
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            document.getElementById('filterJenis').value = '';
            document.getElementById('filterStatus').value = '';
            loadReports();
        }

        // Export all reports to CSV with filters
        function exportAllCSV() {
            const params = new URLSearchParams();
            
            const month = document.getElementById('filterMonth')?.value;
            const year = document.getElementById('filterYear')?.value;
            const startDate = document.getElementById('filterStartDate')?.value;
            const endDate = document.getElementById('filterEndDate')?.value;
            const jenis = document.getElementById('filterJenis')?.value;
            const status = document.getElementById('filterStatus')?.value;

            if (month && year) {
                params.append('month', month);
                params.append('year', year);
            }

            if (startDate && endDate) {
                params.append('start_date', startDate);
                params.append('end_date', endDate);
            }

            if (jenis) {
                params.append('jenis_laporan', jenis);
            }

            if (status) {
                params.append('status', status);
            }

            const queryString = params.toString();
            const url = `${API_URL}/reports/export/csv${queryString ? '?' + queryString : ''}`;
            const filename = `laporan-export-${new Date().toISOString().slice(0,10)}.csv`;
            
            downloadFile(url, filename);
        }

        // Update report status
        async function updateStatus(id) {
            const modal = `
                <div class="modal fade" id="statusModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Update Status Laporan</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <form id="statusForm">
                                    <div class="mb-3">
                                        <label for="status" class="form-label">Pilih Status</label>
                                        <select class="form-select" id="status" required>
                                            <option value="pending">Menunggu</option>
                                            <option value="diterima">Diterima</option>
                                            <option value="diproses">Diproses</option>
                                            <option value="selesai">Selesai</option>
                                            <option value="ditolak">Ditolak</option>
                                        </select>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">
                                        <i class="bi bi-check"></i> Update Status
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            document.body.insertAdjacentHTML('beforeend', modal);
            const modalElement = new bootstrap.Modal(document.getElementById('statusModal'));
            modalElement.show();

            document.getElementById('statusForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const status = document.getElementById('status').value;

                try {
                    await apiCall(`/reports/admin/${id}/status`, {
                        method: 'PUT',
                        body: JSON.stringify({ status })
                    });

                    showAlert('Status berhasil diupdate!', 'success');
                    modalElement.hide();
                    loadReports();
                } catch (error) {
                    showAlert('Gagal update status: ' + error.message, 'danger');
                }
            });

            document.getElementById('statusModal').addEventListener('hidden.bs.modal', function () {
                this.remove();
            });
        }

        // Initial load
        loadReports();

        // Auto refresh every 30 seconds
        setInterval(() => {
            loadReports();
        }, 30000);

        // Mobile Sidebar Toggle
        document.getElementById('sidebarToggle')?.addEventListener('click', function() {
            document.getElementById('sidebar').classList.toggle('active');
        });
    </script>
</body>
</html>
